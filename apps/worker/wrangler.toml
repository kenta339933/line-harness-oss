name = "line-harness"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = true

# ═══════════════════════════════════════════════════════════════
# デフォルト = テスト環境 (noda@)
# 使い方: npx wrangler deploy
# ═══════════════════════════════════════════════════════════════
account_id = "YOUR_DEV_ACCOUNT_ID"

[assets]
directory = "dist/client"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "line-harness"
database_id = "YOUR_DEV_D1_DATABASE_ID"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "line-harness-images"

[[r2_buckets]]
binding = "PAYSLIPS"
bucket_name = "line-harness-payslips"

[triggers]
crons = ["*/5 * * * *"]

# ═══════════════════════════════════════════════════════════════
# 本番環境 (aiagent.mini@)
# 使い方: npx wrangler deploy --env production --name your-worker-name
# D1:     npx wrangler d1 execute line-crm --env production --remote --file ...
# ═══════════════════════════════════════════════════════════════
[env.production]
name = "line-crm-worker"
account_id = "6ec6966a5c19a5a4f21394264fd29527"

[env.production.assets]
directory = "dist/client"
binding = "ASSETS"

[[env.production.d1_databases]]
binding = "DB"
database_name = "line-crm"
database_id = "4b93f990-6dc4-4a8e-8624-bb1173150887"

[[env.production.r2_buckets]]
binding = "IMAGES"
bucket_name = "line-harness-images"

[[env.production.r2_buckets]]
binding = "PAYSLIPS"
bucket_name = "line-harness-payslips"

[env.production.triggers]
crons = ["*/5 * * * *"]
