name = "line-crm-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = true

# ═══════════════════════════════════════════════════════════════
# 本番環境 (line-crm-worker)
# Account: 6ec6966a5c19a5a4f21394264fd29527 (info@hpn-biz.co.jp)
# 使い方: npx wrangler deploy
# D1:     npx wrangler d1 execute line-crm --remote --file ...
# ═══════════════════════════════════════════════════════════════
account_id = "6ec6966a5c19a5a4f21394264fd29527"

[assets]
directory = "dist/client"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "line-crm"
database_id = "4b93f990-6dc4-4a8e-8624-bb1173150887"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "line-harness-images"

[[r2_buckets]]
binding = "PAYSLIPS"
bucket_name = "line-harness-payslips"

[triggers]
crons = ["*/5 * * * *"]
